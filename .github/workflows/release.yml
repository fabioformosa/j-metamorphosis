# GitHub Actions workflow for Maven Central release
# Triggers on GitHub Release creation (published)

name: Release to Maven Central

on:
  release:
    types: [published]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: metamorphosis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: maven-central-release
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.MAVEN_GPG_SECRET_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Set release version (skip, already set before tag)
        run: echo "Version should already be set by pre-tag commit."

      - name: Build and publish to Maven Central
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_SECRET_KEY: ${{ secrets.MAVEN_GPG_SECRET_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_SECRET_KEY_PASSWORD }}
        run: |
          test -n "$MAVEN_USERNAME" || (echo "Missing secret: MAVEN_CENTRAL_TOKEN_USERNAME" && exit 1)
          test -n "$MAVEN_PASSWORD" || (echo "Missing secret: MAVEN_CENTRAL_TOKEN_PASSWORD" && exit 1)
          test -n "$MAVEN_GPG_SECRET_KEY" || (echo "Missing secret: MAVEN_GPG_SECRET_KEY" && exit 1)
          test -n "$MAVEN_GPG_PASSPHRASE" || (echo "Missing secret: MAVEN_GPG_SECRET_KEY_PASSWORD" && exit 1)
          mvn -B clean deploy -P release-maven-central -Dgpg.passphrase="$MAVEN_GPG_PASSPHRASE"

      - name: Archive built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: metamorphosis/*/target/*.jar
